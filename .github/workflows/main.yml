name: Nodejs

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "25 */1 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm ci

      - name: Executar node index.js
        env:
          URL: ${{ secrets.URL }}
          PROXY: ${{ secrets.PROXY }}
          ADDRESS: ${{ secrets.ADDRESS }}
        timeout-minutes: 15
        continue-on-error: true
        run: xvfb-run --auto-servernum -- node --trace-warnings index.js

      - name: Upload da captura
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: screenshot
          path: screen.png
